name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        run: |
          if [ -z "${{ secrets.HF_TOKEN }}" ]; then
            echo "Error: HF_TOKEN secret is empty or not set in GitHub Secrets!"
            exit 1
          fi
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git checkout --orphan hf-deploy
          git reset
          git add backend/ Dockerfile .dockerignore .gitignore README.md
          git commit -m "deploy: Hugging Face Space backend service"
          git push --force https://sndpth:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/sndpth/doctorsaap-backend hf-deploy:main

